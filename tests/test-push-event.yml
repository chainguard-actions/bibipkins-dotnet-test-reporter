name: Test push event (non-PR context)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          results-path: ${{ github.workspace }}/tests/fixtures/results-passing.trx
          comment-title: 'My Custom Test Results'
          allow-failed-tests: 'true'
          post-new-comment: 'false'
          show-failed-tests-only: 'false'
          show-test-output: 'true'

      - name: Assert tests-total output is populated
        env:
          ACTUAL: ${{ steps.action.outputs.tests-total }}
        run: |
          echo "tests-total: $ACTUAL"
          if [ "$ACTUAL" != "3" ]; then
            echo "FAIL: expected tests-total=3, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert tests-passed output is populated
        env:
          ACTUAL: ${{ steps.action.outputs.tests-passed }}
        run: |
          echo "tests-passed: $ACTUAL"
          if [ "$ACTUAL" != "3" ]; then
            echo "FAIL: expected tests-passed=3, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert tests-failed is zero
        env:
          ACTUAL: ${{ steps.action.outputs.tests-failed }}
        run: |
          echo "tests-failed: $ACTUAL"
          if [ "$ACTUAL" != "0" ]; then
            echo "FAIL: expected tests-failed=0, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
