name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          results-path: actions/hardened/bibipkins--dotnet-test-reporter/v1.6.1/tests/fixtures/results.trx
          allow-failed-tests: 'true'
          post-new-comment: 'false'
        continue-on-error: true

      - name: Assert tests-total output
        env:
          ACTUAL: ${{ steps.action.outputs.tests-total }}
        run: |
          echo "tests-total: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: tests-total output is empty"
            exit 1
          fi
          echo "PASS: tests-total=$ACTUAL"

      - name: Assert tests-passed output
        env:
          ACTUAL: ${{ steps.action.outputs.tests-passed }}
        run: |
          echo "tests-passed: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: tests-passed output is empty"
            exit 1
          fi
          echo "PASS: tests-passed=$ACTUAL"

      - name: Assert tests-failed output
        env:
          ACTUAL: ${{ steps.action.outputs.tests-failed }}
        run: |
          echo "tests-failed: $ACTUAL"
          if [ "$ACTUAL" = "" ]; then
            echo "FAIL: tests-failed output is empty"
            exit 1
          fi
          echo "PASS: tests-failed=$ACTUAL"

      - name: Assert tests-skipped output
        env:
          ACTUAL: ${{ steps.action.outputs.tests-skipped }}
        run: |
          echo "tests-skipped: $ACTUAL"
          if [ "$ACTUAL" = "" ]; then
            echo "FAIL: tests-skipped output is empty"
            exit 1
          fi
          echo "PASS: tests-skipped=$ACTUAL"
